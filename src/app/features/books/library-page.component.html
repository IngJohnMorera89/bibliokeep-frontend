<section class="min-h-screen bg-[#111827] p-8 space-y-8 text-white">
  
  <header class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
    <div class="space-y-1">
      <p class="text-xs font-bold uppercase tracking-[0.24em] text-slate-400">Biblioteca</p>
      <h1 class="text-4xl font-extrabold tracking-tight">Tus libros</h1>
      <p class="text-slate-400">Gestiona tu colección y añade nuevos títulos.</p>
    </div>

    <form [formGroup]="searchForm" class="w-full max-w-xl">
      <div class="relative">
        <span class="sr-only">Buscar libros</span>
        <input
          formControlName="query"
          type="search"
          placeholder="Buscar por título o autor..."
          class="w-full rounded-2xl border border-slate-700 bg-[#1f2937] px-5 py-3.5 text-white outline-none transition focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 placeholder-slate-500"
          (input)="bookStore.setFilter(searchForm.get('query')?.value ?? '')"
        />
      </div>
    </form>
  </header>

  <div class="grid gap-8 xl:grid-cols-[1.6fr_1fr]">
    
    <div class="space-y-6">
      <div class="grid gap-6 md:grid-cols-2">
        @for (book of books(); track book.id) {
          <div class="transition-transform hover:-translate-y-1">
            <bk-book-card [book]="book"></bk-book-card>
          </div>
        } @empty {
          <div class="col-span-full flex flex-col items-center justify-center py-20 bg-[#1f2937]/50 rounded-3xl border border-dashed border-slate-700">
            <p class="text-slate-500 font-medium">No se encontraron libros en tu colección.</p>
          </div>
        }
      </div>
    </div>

    <aside class="h-fit rounded-3xl bg-[#1f2937] border border-slate-800 p-8 shadow-2xl">
      <h2 class="text-2xl font-bold text-white mb-1">Agregar libro nuevo</h2>
      <p class="text-slate-400 text-sm mb-8">Completa la información del ejemplar.</p>

      <form [formGroup]="bookForm" (ngSubmit)="addBook()" class="space-y-5">
        
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Título</label>
          <input
            formControlName="title"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
          />
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Autor(es)</label>
          <input
            formControlName="authors"
            placeholder="Ej: Gabriel García Márquez"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40 placeholder-slate-600"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">ISBN</label>
            <input
              formControlName="isbn"
              class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
            />
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Calificación</label>
            <input 
              type="number" 
              formControlName="rating" 
              min="1" max="5"
              class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Estado</label>
          <select
            formControlName="status"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40 appearance-none cursor-pointer"
          >
            <option value="DESEADO">💖 DESEADO</option>
            <option value="COMPRADO">📦 COMPRADO</option>
            <option value="LEYENDO">📖 LEYENDO</option>
            <option value="LEIDO">✅ LEIDO</option>
            <option value="ABANDONADO">❌ ABANDONADO</option>
          </select>
        </div>

        <button
          type="submit"
          class="w-full mt-4 rounded-xl bg-blue-600 px-4 py-4 text-sm font-bold text-white transition-all hover:bg-blue-500 hover:shadow-[0_0_20px_rgba(37,99,235,0.4)] disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="bookForm.invalid"
        >
          Guardar en Biblioteca
        </button>
      </form>
    </aside>
  </div>
</section>
