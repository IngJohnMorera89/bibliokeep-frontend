<section class="min-h-screen space-y-8 bg-[#111827] p-8 text-white">
  <header class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
    <div class="space-y-1">
      <p class="text-xs font-bold uppercase tracking-[0.24em] text-slate-400">Biblioteca</p>
      <h1 class="text-4xl font-extrabold tracking-tight">Tus libros</h1>
      <p class="text-slate-400">Gestiona tu colección y añade nuevos títulos.</p>
    </div>

    <form [formGroup]="searchForm" class="w-full max-w-xl">
      <div class="relative">
        <span class="sr-only">Buscar libros</span>
        <input
          formControlName="query"
          type="search"
          placeholder="Buscar por título o autor..."
          class="w-full rounded-2xl border border-slate-700 bg-[#1f2937] px-5 py-3.5 text-white outline-none transition placeholder:text-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50"
          (input)="bookStore.setFilter(searchForm.get('query')?.value ?? '')"
        />
      </div>
    </form>
  </header>

  <div class="grid gap-8 xl:grid-cols-[1.6fr_1fr]">
    <div class="space-y-6">
      <div class="grid gap-6 md:grid-cols-2">
        @for (book of books(); track book.id) {
          <div class="transition-transform hover:-translate-y-1">
            <bk-book-card [book]="book"></bk-book-card>
          </div>
        } @empty {
          <div
            class="col-span-full flex flex-col items-center justify-center rounded-3xl border border-dashed border-slate-700 bg-[#1f2937]/50 py-20"
          >
            <p class="font-medium text-slate-500">No se encontraron libros en tu colección.</p>
          </div>
        }
      </div>
    </div>

    <aside class="h-fit rounded-3xl border border-slate-800 bg-[#1f2937] p-8 shadow-2xl">
      <h2 class="mb-1 text-2xl font-bold text-white">Agregar libro nuevo</h2>
      <p class="mb-8 text-sm text-slate-400">Completa la información del ejemplar.</p>

      <form [formGroup]="bookForm" (ngSubmit)="addBook()" class="space-y-5">
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400"
            >Título</label
          >
          <input
            formControlName="title"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
          />
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400"
            >Autor(es)</label
          >
          <input
            formControlName="authors"
            placeholder="Ej: Gabriel García Márquez"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition placeholder:text-slate-600 focus:ring-2 focus:ring-blue-500/40"
          />

          <!--<input
            formControlName="thumbnail"
            type="url"
            placeholder="https://ejemplo.com/imagen.jpg"
            class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40 placeholder-slate-600"
          />-->
        </div>

        <div class="space-y-2">
          <label class="mb-2.5 block text-sm font-medium text-white" for="file_input"
            >Portada del libro</label
          >
          <div class="relative">
            <input
              id="thumbnail"
              type="file"
              class="block w-full cursor-pointer rounded-xl border border-slate-700 bg-[#111827] text-sm text-slate-400 shadow-xs file:mr-4 file:border-0 file:bg-slate-800 file:px-4 file:py-3 file:text-white hover:file:bg-slate-700"
              (change)="onSelectFile($event)"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400"
              >ISBN</label
            >
            <input
              formControlName="isbn"
              class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
            />
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400"
              >Calificación</label
            >
            <input
              type="number"
              formControlName="rating"
              min="1"
              max="5"
              class="w-full rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400"
            >Estado</label
          >
          <select
            formControlName="status"
            class="w-full cursor-pointer appearance-none rounded-xl border border-slate-700 bg-[#111827] px-4 py-3 text-white outline-none transition focus:ring-2 focus:ring-blue-500/40"
          >
            <option value="DESEADO">💖 DESEADO</option>
            <option value="COMPRADO">📦 COMPRADO</option>
            <option value="LEYENDO">📖 LEYENDO</option>
            <option value="LEIDO">✅ LEIDO</option>
            <option value="ABANDONADO">❌ ABANDONADO</option>
          </select>
        </div>

        <form [formGroup]="bookForm" (ngSubmit)="addBook()" class="space-y-5">
          <button
            type="submit"
            class="mt-4 w-full rounded-xl bg-blue-600 px-4 py-4 text-sm font-bold text-white transition-all hover:bg-blue-500 hover:shadow-[0_0_20px_rgba(37,99,235,0.4)] disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="bookForm.invalid"
          >
            Guardar en Biblioteca
          </button>
        </form>
      </form>
    </aside>
  </div>
</section>
