<section class="space-y-6 p-6">
  <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <p class="text-sm uppercase tracking-[0.24em] text-slate-500">Buscar libro</p>
      <h1 class="mt-2 text-3xl font-semibold text-slate-950">Búsqueda híbrida</h1>
    </div>

    <form [formGroup]="searchForm" class="w-full max-w-xl">
      <label class="relative block w-full">
        <span class="sr-only">Buscar por título, autor o ISBN</span>
        <input
          formControlName="query"
          type="search"
          placeholder="Buscar por título, autor o ISBN"
          class="w-full rounded-3xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-cyan-500"
          (input)="searchService.search(searchForm.get('query')?.value ?? '')"
        />
      </label>
    </form>
  </header>

  <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    <ng-container *ngFor="let book of searchService.results()">
      <bk-book-card [book]="book"></bk-book-card>
    </ng-container>
  </div>

  <p *ngIf="searchService.results().length === 0" class="text-center text-slate-500">Empieza a escribir para ver resultados de búsqueda.</p>
</section>
