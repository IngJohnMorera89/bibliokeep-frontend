<main class="grid min-h-screen place-items-center bg-slate-950 px-4 py-10 text-white">
  <section class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900/95 p-8 shadow-2xl backdrop-blur">
    <h1 class="text-3xl font-semibold">Crea tu cuenta</h1>
    <p class="mt-2 text-slate-400">Empieza a registrar tus libros y préstamos.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-8 space-y-5">
      <label class="block text-sm font-medium text-slate-200">
        Correo electrónico
        <input
          type="email"
          formControlName="email"
          class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-cyan-500"
          aria-label="Correo electrónico"
        />
      </label>

      <label class="block text-sm font-medium text-slate-200">
        Contraseña
        <input
          type="password"
          formControlName="password"
          class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-cyan-500"
          aria-label="Contraseña"
        />
      </label>

      <button
        type="submit"
        class="w-full rounded-2xl bg-cyan-500 px-4 py-3 font-semibold text-slate-950 transition hover:bg-cyan-400"
      >
        Registrarme
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-400">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="font-semibold text-cyan-400 hover:text-cyan-300">Inicia sesión</a>
    </p>
  </section>
</main>
