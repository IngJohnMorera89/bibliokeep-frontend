<main class="grid min-h-screen place-items-center bg-gradient-to-br from-gray-900 to-gray-800 px-4 py-10 text-white">
  <section class="w-full max-w-md rounded-3xl border border-gray-700 bg-gray-800/95 p-8 shadow-2xl backdrop-blur-sm">
    <h1 class="text-3xl font-semibold">Crea tu cuenta</h1>
    <p class="mt-2 text-gray-400">Empieza a registrar tus libros y préstamos.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-8 space-y-5">
      <label class="block text-sm font-medium text-gray-200">
        Correo electrónico
        <input
          type="email"
          formControlName="email"
          class="mt-2 w-full rounded-2xl border border-gray-600 bg-gray-900 px-4 py-3 text-gray-100 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
          aria-label="Correo electrónico"
          />
        </label>

        <label class="block text-sm font-medium text-gray-200">
          Contraseña
          <input
            type="password"
            formControlName="password"
            class="mt-2 w-full rounded-2xl border border-gray-600 bg-gray-900 px-4 py-3 text-gray-100 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
            aria-label="Contraseña"
            />
          </label>

          <div class="block text-sm font-medium text-gray-200">
            <label class="mb-3 block">Géneros de preferencia</label>
            <div class="space-y-2">
              @for (genre of genres; track genre) {
                <label class="flex items-center gap-3">
                  <input
                    type="checkbox"
                    [checked]="selectedPreferences().has(genre)"
                    (change)="togglePreference(genre)"
                    class="h-4 w-4 rounded border-gray-600 bg-gray-900 text-blue-500 focus:ring-blue-500"
                    [attr.aria-label]="'Género: ' + genre"
                    />
                    <span class="text-gray-300">{{ genre }}</span>
                  </label>
                }
              </div>
            </div>

            <label class="block text-sm font-medium text-gray-200">
              Meta anual de lecturas
              <input
                type="number"
                formControlName="annualGoal"
                min="1"
                class="mt-2 w-full rounded-2xl border border-gray-600 bg-gray-900 px-4 py-3 text-gray-100 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                aria-label="Meta anual de lecturas"
                />
              </label>

              <button
                type="submit"
                class="w-full rounded-2xl bg-blue-500 px-4 py-3 font-semibold text-white transition hover:bg-blue-400 focus:ring-2 focus:ring-blue-500/20"
                >
                Registrarme
              </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-400">
              ¿Ya tienes cuenta?
              <a routerLink="/login" class="font-semibold text-blue-400 hover:text-blue-300 transition">Inicia sesión</a>
            </p>
          </section>
        </main>
