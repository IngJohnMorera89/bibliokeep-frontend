<header class="flex flex-col gap-4 border-b border-gray-200 bg-white px-6 py-5 shadow-lg sm:flex-row sm:items-center sm:justify-between">
  <div>
    <p class="text-sm text-gray-500">Panel de control</p>
    <h2 class="text-xl font-semibold text-gray-900">Gestiona tu colección desde aquí</h2>
  </div>

  <div class="flex flex-wrap items-center gap-3">
    <span class="rounded-full bg-gray-100 px-4 py-2 text-sm text-gray-700">{{ userLabel() }}</span>
    <button
      type="button"
      class="rounded-2xl bg-blue-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-400 focus:ring-2 focus:ring-blue-500/20"
      (click)="logout()"
    >
      Cerrar sesión
    </button>
  </div>
</header>
